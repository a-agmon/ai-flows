id: letter_generation
name: Letter Generation
route: /agents/letter-generation

description: >
  Classifies an incoming customer request, rejects unsupported ones early,
  then drafts a letter from independently generated sections and polishes it.

inputs:
  user_request:
    type: string
    required: true
  tone:
    type: string
    required: false
    default: professional
  include_legal_disclaimer:
    type: boolean
    required: false
    default: false

outputs:
  - final_letter
  - request_status
  - rejection_reason

stages:
  # 1. Decide whether we can handle the request; stop early if not.
  - id: classify
    parallel: false
    nodes:
      - id: classify_request
        type: llm
        model: gpt-4.1-mini
        temperature: 0
        output_key: classification
        prompt: |
          Decide whether this customer request can be handled by a support
          letter. Return ONLY JSON of the form:
          {"request_status": "supported" | "unsupported", "rejection_reason": string | null}

          Request:
          {{ user_request }}

      - id: unpack_classification
        type: module
        module: transforms
        function: unpack_classification
        merge_output: true
        inputs:
          classification: classification

    end_if:
      field: request_status
      equals: unsupported
      reason: unsupported_request

  # 2. Draft the three sections in parallel.
  - id: generate_letter_parts
    parallel: true
    nodes:
      - id: write_intro
        type: llm
        model: gpt-4.1-mini
        temperature: 0.2
        prompt_file: letter_intro.md
        output_key: intro_text

      - id: write_body
        type: llm
        model: gpt-4.1-mini
        temperature: 0.2
        prompt_file: letter_body.md
        output_key: body_text

      - id: write_closing
        type: llm
        model: gpt-4.1-mini
        temperature: 0.2
        prompt_file: letter_closing.md
        output_key: closing_text

  # 3. Join the sections into a single draft.
  - id: assemble
    parallel: false
    nodes:
      - id: assemble_letter
        type: module
        module: transforms
        function: assemble_letter
        output_key: draft_letter
        inputs:
          intro: intro_text
          policy: body_text
          closing: closing_text

  # 4. Optionally generate a legal disclaimer (skipped unless requested).
  - id: legal
    parallel: false
    nodes:
      - id: add_legal_disclaimer
        type: llm
        model: gpt-4.1-mini
        temperature: 0.1
        prompt_file: legal_disclaimer.md
        output_key: legal_disclaimer
        when:
          field: include_legal_disclaimer
          equals: true

  # 5. Polish the final letter.
  - id: polish
    parallel: false
    nodes:
      - id: polish_letter
        type: llm
        model: gpt-4.1-mini
        temperature: 0.1
        prompt_file: polish.md
        output_key: final_letter
