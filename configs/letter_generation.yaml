id: letter_generation
name: Hospital Discharge Letter
route: /agents/letter-generation

description: >
  Generates three paragraphs of a hospital discharge letter in parallel from a
  single discharge brief, merges them into one letter with an LLM, then runs a
  guardrail check over the result.

inputs:
  discharge:
    type: object
    required: true
    # Shape:
    # {
    #   "patient_name": "Jane Doe",
    #   "admission": { "date": "2026-06-10", "reason": "..." },
    #   "diagnosis": "...",
    #   "hospital_course": "...",
    #   "medications": ["..."],
    #   "follow_up": ["..."],
    #   "attending_physician": "Dr. ..."
    # }

outputs:
  - final_letter
  - guardrail_passed
  - guardrail_issues

stages:
  # 1. Three paragraphs, generated concurrently. Same input (discharge),
  #    each node reads a DIFFERENT key out of it and writes a DISTINCT key.
  - id: write_paragraphs
    parallel: true
    nodes:
      - id: write_summary
        type: llm
        model: gpt-4.1-mini
        temperature: 0.2
        prompt_file: discharge/summary.md
        output_key: summary_text

      - id: write_treatment
        type: llm
        model: gpt-4.1-mini
        temperature: 0.2
        prompt_file: discharge/treatment.md
        output_key: treatment_text

      - id: write_followup
        type: llm
        model: gpt-4.1-mini
        temperature: 0.2
        prompt_file: discharge/followup.md
        output_key: followup_text

  # 2. Merge the three paragraphs into one letter (also an LLM). By now
  #    summary_text, treatment_text and followup_text are all in state — the
  #    parallel join merged them — so this single prompt can read all three.
  - id: merge_letter
    parallel: false
    nodes:
      - id: merge_paragraphs
        type: llm
        model: gpt-4.1-mini
        temperature: 0.1
        prompt_file: discharge/merge.md
        output_key: final_letter

  # 3. Guardrail: a deterministic Python check over the finished letter.
  - id: guardrail
    parallel: false
    nodes:
      - id: check_letter
        type: module
        module: transforms
        function: guardrail_check
        merge_output: true            # returns {guardrail_passed, guardrail_issues}
        inputs:
          letter: final_letter
